name: Deploy

# Triggers after the CI workflow completes successfully on main.
# This guarantees tests + lint pass before any deploy runs.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/kayzo1903/tzdraft-backend
  FRONTEND_IMAGE: ghcr.io/kayzo1903/tzdraft-frontend

jobs:
  # ── Job 1: Build & push Docker images to GHCR ───────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate required build-time env vars
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_BETTER_AUTH_URL: ${{ vars.NEXT_PUBLIC_BETTER_AUTH_URL }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
        run: |
          : "${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is not set in GitHub → Environments → production → Variables}"
          : "${NEXT_PUBLIC_BETTER_AUTH_URL:?NEXT_PUBLIC_BETTER_AUTH_URL is not set in GitHub → Environments → production → Variables}"
          : "${NEXT_PUBLIC_SANITY_PROJECT_ID:?NEXT_PUBLIC_SANITY_PROJECT_ID is not set in GitHub → Environments → production → Variables}"
          echo "✅ Build-time env vars validated"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.event.workflow_run.head_sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_BETTER_AUTH_URL=${{ vars.NEXT_PUBLIC_BETTER_AUTH_URL }}
            NEXT_PUBLIC_SANITY_PROJECT_ID=${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
            NEXT_PUBLIC_SANITY_DATASET=${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy to VPS ─────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    env:
      DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Checkout (for docker-compose.prod.yml)
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/tzdraft/

      - name: Pull images & restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/tzdraft

            # Authenticate with GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull specific SHA images
            IMAGE_TAG=${{ env.DEPLOY_SHA }} docker compose -f docker-compose.prod.yml pull

            # Start new version
            IMAGE_TAG=${{ env.DEPLOY_SHA }} docker compose -f docker-compose.prod.yml up -d --remove-orphans

      - name: Health check & Auto-Rollback
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/tzdraft
            
            echo "Waiting for backend container to become healthy..."
            HEALTHY=false
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose -f docker-compose.prod.yml ps -q backend) 2>/dev/null || echo "not_found")
              echo "Attempt $i: container health=$STATUS"
              if [ "$STATUS" = "healthy" ]; then
                HEALTHY=true
                echo "✅ Backend is healthy!"
                # Save this SHA as the last successful one
                echo "${{ env.DEPLOY_SHA }}" > .last_success_sha
                break
              fi
              sleep 5
            done

            if [ "$HEALTHY" = false ]; then
              echo "❌ Health check failed! Initiating rollback..."
              
              if [ -f .last_success_sha ]; then
                LAST_SHA=$(cat .last_success_sha)
                echo "Reverting to last working SHA: $LAST_SHA"
                IMAGE_TAG=$LAST_SHA docker compose -f docker-compose.prod.yml up -d --remove-orphans
                echo "✅ Rollback complete. Site is back to version $LAST_SHA"
              else
                echo "⚠️ No .last_success_sha found. Cannot rollback automatically. Please check logs manually."
              fi
              
              # Exit with failure so GitHub Action shows red
              exit 1
            fi

            # Clean up old images to reclaim disk space
            docker image prune -af --filter "until=24h"

