name: Deploy

# Triggers after the CI workflow completes successfully on main.
# This guarantees tests + lint pass before any deploy runs.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/kayzo1903/tzdraft-backend
  FRONTEND_IMAGE: ghcr.io/kayzo1903/tzdraft-frontend

jobs:
  # ── Job 1: Build & push Docker images to GHCR ───────────────────────────
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    # Only run if the CI workflow succeeded
    if: github.event.workflow_run.conclusion == 'success'
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Validate required build-time env vars
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_BETTER_AUTH_URL: ${{ vars.NEXT_PUBLIC_BETTER_AUTH_URL }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
        run: |
          : "${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is not set in GitHub → Environments → production → Variables}"
          : "${NEXT_PUBLIC_BETTER_AUTH_URL:?NEXT_PUBLIC_BETTER_AUTH_URL is not set in GitHub → Environments → production → Variables}"
          : "${NEXT_PUBLIC_SANITY_PROJECT_ID:?NEXT_PUBLIC_SANITY_PROJECT_ID is not set in GitHub → Environments → production → Variables}"
          echo "✅ Build-time env vars validated"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.event.workflow_run.head_sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_BETTER_AUTH_URL=${{ vars.NEXT_PUBLIC_BETTER_AUTH_URL }}
            NEXT_PUBLIC_SANITY_PROJECT_ID=${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
            NEXT_PUBLIC_SANITY_DATASET=${{ vars.NEXT_PUBLIC_SANITY_DATASET }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy to VPS ─────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout (for docker-compose.prod.yml)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.prod.yml
          target: /opt/tzdraft/

      - name: Pull images & restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/tzdraft

            # Authenticate with GHCR using a deploy token
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull new images (IMAGE_TAG=latest so compose picks them up)
            IMAGE_TAG=latest docker compose -f docker-compose.prod.yml pull

            # Restart containers — do NOT use set -e here so we can capture logs on failure
            set +e
            IMAGE_TAG=latest docker compose -f docker-compose.prod.yml up -d --remove-orphans
            COMPOSE_EXIT=$?
            set -e

            if [ $COMPOSE_EXIT -ne 0 ]; then
              echo "❌ docker compose up failed (exit $COMPOSE_EXIT). Backend logs:"
              docker compose -f docker-compose.prod.yml logs backend --tail=80
              exit $COMPOSE_EXIT
            fi

            # Clean up old dangling images to reclaim disk space
            docker image prune -f

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "Waiting for backend container to become healthy..."
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose -f /opt/tzdraft/docker-compose.prod.yml ps -q backend) 2>/dev/null || echo "not_found")
              echo "Attempt $i: container health=$STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "✅ Backend is healthy!"
                exit 0
              fi
              sleep 5
            done
            echo "❌ Health check failed after 150s"
            docker compose -f /opt/tzdraft/docker-compose.prod.yml logs backend --tail=50
            exit 1
