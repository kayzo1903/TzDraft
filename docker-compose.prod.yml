# Production docker-compose — uses pre-built images from GHCR.
# Database (Supabase) is external — set DATABASE_URL in .env on the VPS.
# Do NOT use this file for local dev; use docker-compose.yml instead.

services:
  redis:
    image: redis:7-alpine
    # No persistence (game/matchmaking state is ephemeral — safe to lose on restart).
    # maxmemory 512mb: hard cap so Redis never OOMs the CX33 (8 GB) host.
    # allkeys-lru: evict least-recently-used keys when cap is reached (safe for caches).
    command: redis-server --save "" --appendonly no --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: ghcr.io/kayzo1903/tzdraft-backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      APP_URL: ${APP_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRATION: 7d
      BACKEND_URL: ${BACKEND_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_AUTH_DOMAIN: ${RESEND_AUTH_DOMAIN:-}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      BEAM_AFRICA_SENDER_ID: ${BEAM_AFRICA_SENDER_ID:-}
      BEAM_AFRICA_API_KEY: ${BEAM_AFRICA_API_KEY:-}
      BEAM_AFRICA_SECRET_KEY: ${BEAM_AFRICA_SECRET_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "3002:3002"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    image: ghcr.io/kayzo1903/tzdraft-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # NOTE: NEXT_PUBLIC_* vars are baked into the JS bundle at Docker build time
      # via build-args in deploy.yml — setting them here has NO effect on a pre-built image.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend
